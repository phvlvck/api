<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام إدارة الاشتراكات</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-key"></i>
                <span>مدير الاشتراكات</span>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="icon-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-profile">
                    <span id="userName">المطور</span>
                    <i class="fas fa-user-circle"></i>
                    <button id="logoutBtn" class="btn btn-danger btn-sm">خروج</button>
                </div>
            </div>
        </nav>

        <div class="main-container">
            <aside class="sidebar">
                <ul class="nav-menu">
                    <li class="nav-item active" data-page="dashboard">
                        <i class="fas fa-chart-pie"></i>
                        <span>لوحة التحكم</span>
                    </li>
                    <li class="nav-item" data-page="subscriptions">
                        <i class="fas fa-key"></i>
                        <span>الاشتراكات</span>
                    </li>
                    <li class="nav-item" data-page="devices">
                        <i class="fas fa-mobile-alt"></i>
                        <span>الأجهزة</span>
                    </li>
                    <li class="nav-item" data-page="create">
                        <i class="fas fa-plus-circle"></i>
                        <span>إنشاء اشتراك</span>
                    </li>
                </ul>
            </aside>

            <main class="content" id="content">
                <!-- المحتوى -->
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
