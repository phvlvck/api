<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 نظام إدارة أكواد التفعيل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #8899bb; margin-top: 10px; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
        }
        .card:hover {
            border-color: rgba(0,212,255,0.3);
            box-shadow: 0 0 30px rgba(0,212,255,0.05);
        }
        .card-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.1);
        }
        input::placeholder, textarea::placeholder { color: #556688; }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            margin: 5px 0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        .btn-success {
            background: #00c851;
            color: #fff;
        }
        .btn-success:hover {
            background: #00a844;
            transform: scale(1.02);
        }
        .btn-danger {
            background: #ff4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #cc0000;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            margin: 2px;
        }
        
        .license-box {
            background: rgba(0,212,255,0.05);
            border: 1px dashed rgba(0,212,255,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            color: #00d4ff;
            min-height: 50px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        th, td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            color: #8899bb;
            font-weight: normal;
            font-size: 12px;
            text-transform: uppercase;
        }
        td { color: #ccd; }
        .status-active { color: #00c851; }
        .status-inactive { color: #ff4444; }
        .status-expired { color: #ffbb33; }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 10px;
            color: #8899bb;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: rgba(0,212,255,0.15);
            color: #00d4ff;
        }
        .tab:hover { background: rgba(255,255,255,0.1); }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(0,212,255,0.2);
            display: none;
            z-index: 999;
        }
        .toast.show { display: block; animation: fadeInUp 0.5s; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #556688;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .flex-row .btn { flex: 1; min-width: 80px; }
        
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            background: rgba(0,212,255,0.15);
            color: #00d4ff;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>🔑 نظام إدارة أكواد التفعيل</h1>
        <p>📍 قم بتوليد وإدارة مفاتيح التفعيل لتطبيقاتك بسهولة</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('generate')">🆕 توليد كود</button>
        <button class="tab" onclick="showTab('validate')">✅ التحقق</button>
        <button class="tab" onclick="showTab('list')">📋 قائمة الأكواد</button>
        <button class="tab" onclick="showTab('stats')">📊 إحصائيات</button>
    </div>

    <!-- ===== TAB 1: Generate ===== -->
    <div id="tab-generate" class="tab-content">
        <div class="grid">
            <div class="card">
                <div class="card-title">🆕 توليد مفتاح جديد</div>
                <label>اسم التطبيق</label>
                <input type="text" id="appName" value="MyApp" placeholder="اسم التطبيق">
                
                <label>عدد الأجهزة المسموحة</label>
                <input type="number" id="maxDevices" value="1" min="1" max="10">
                
                <label>مدة الصلاحية (يوم)</label>
                <input type="number" id="daysValid" value="365" min="1" max="9999">
                
                <button class="btn btn-primary" onclick="generateLicense()">🚀 توليد المفتاح</button>
                
                <div style="margin-top: 15px;">
                    <label>المفتاح المُولّد</label>
                    <div class="license-box" id="generatedKey">اضغط على توليد...</div>
                    <button class="btn btn-success btn-sm" onclick="copyKey()" style="width:auto;margin-top:8px;">📋 نسخ</button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">📤 تصدير / استيراد</div>
                <label>تصدير جميع المفاتيح (JSON)</label>
                <button class="btn btn-secondary" onclick="exportKeys()" style="width:auto;">📥 تحميل</button>
                <br><br>
                <label>استيراد مفاتيح (JSON)</label>
                <input type="file" id="importFile" accept=".json" style="padding:8px;">
                <button class="btn btn-secondary" onclick="importKeys()" style="width:auto;">📤 استيراد</button>
            </div>
        </div>
    </div>

    <!-- ===== TAB 2: Validate ===== -->
    <div id="tab-validate" class="tab-content" style="display:none;">
        <div class="card" style="max-width:600px;margin:auto;">
            <div class="card-title">✅ التحقق من مفتاح التفعيل</div>
            <label>أدخل مفتاح التفعيل</label>
            <input type="text" id="validateKey" placeholder="مثال: A1B2C3D4E5F6G7H8">
            <label>معرف الجهاز (اختياري)</label>
            <input type="text" id="deviceId" placeholder="Device ID">
            <button class="btn btn-primary" onclick="validateLicense()">🔍 تحقق</button>
            <div id="validateResult" class="license-box" style="margin-top:15px;color:#fff;">في انتظار التحقق...</div>
        </div>
    </div>

    <!-- ===== TAB 3: List ===== -->
    <div id="tab-list" class="tab-content" style="display:none;">
        <div class="card">
            <div class="flex-row" style="justify-content:space-between;align-items:center;">
                <div class="card-title" style="margin:0;">📋 قائمة المفاتيح</div>
                <button class="btn btn-danger btn-sm" onclick="clearAllKeys()" style="width:auto;">🗑️ حذف الكل</button>
            </div>
            <div id="keysTable">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>لا توجد مفاتيح بعد</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== TAB 4: Stats ===== -->
    <div id="tab-stats" class="tab-content" style="display:none;">
        <div class="grid">
            <div class="card">
                <div class="card-title">📊 إحصائيات سريعة</div>
                <div id="statsContent">
                    <p style="color:#8899bb;">جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
</div>

<script>
// ============================================================
//  🗄️  تخزين البيانات في LocalStorage
// ============================================================

const STORAGE_KEY = 'activation_licenses';

function getLicenses() {
    try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
        return [];
    }
}

function saveLicenses(licenses) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(licenses));
}

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

// ============================================================
//  🆕  توليد مفتاح جديد
// ============================================================

function generateLicense() {
    const appName = document.getElementById('appName').value || 'MyApp';
    const maxDevices = parseInt(document.getElementById('maxDevices').value) || 1;
    const daysValid = parseInt(document.getElementById('daysValid').value) || 365;
    
    // توليد مفتاح عشوائي
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let key = '';
    for (let i = 0; i < 16; i++) {
        key += chars.charAt(Math.floor(Math.random() * chars.length));
        if (i === 3 || i === 7 || i === 11) key += '-';
    }
    
    const now = new Date();
    const expires = new Date(now);
    expires.setDate(expires.getDate() + daysValid);
    
    const license = {
        id: generateId(),
        key: key,
        app_name: appName,
        max_devices: maxDevices,
        status: 'active',
        created_at: now.toISOString(),
        expires_at: expires.toISOString(),
        used_count: 0,
        devices: []
    };
    
    const licenses = getLicenses();
    licenses.push(license);
    saveLicenses(licenses);
    
    document.getElementById('generatedKey').textContent = key;
    showToast('✅ تم توليد المفتاح بنجاح!');
    renderTable();
    updateStats();
}

function copyKey() {
    const key = document.getElementById('generatedKey').textContent;
    if (key && key !== 'اضغط على توليد...') {
        navigator.clipboard.writeText(key).then(() => {
            showToast('📋 تم نسخ المفتاح!');
        }).catch(() => {
            // طريقة بديلة
            const textarea = document.createElement('textarea');
            textarea.value = key;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('📋 تم نسخ المفتاح!');
        });
    } else {
        showToast('⚠️ لا يوجد مفتاح للنسخ');
    }
}

// ============================================================
//  ✅  التحقق من المفتاح
// ============================================================

function validateLicense() {
    const key = document.getElementById('validateKey').value.trim().toUpperCase();
    const deviceId = document.getElementById('deviceId').value.trim() || 'unknown';
    const resultDiv = document.getElementById('validateResult');
    
    if (!key) {
        resultDiv.innerHTML = '⚠️ الرجاء إدخال مفتاح التفعيل';
        resultDiv.style.color = '#ffbb33';
        return;
    }
    
    const licenses = getLicenses();
    const license = licenses.find(l => l.key === key);
    
    if (!license) {
        resultDiv.innerHTML = '❌ المفتاح غير صحيح أو غير موجود';
        resultDiv.style.color = '#ff4444';
        return;
    }
    
    if (license.status === 'inactive') {
        resultDiv.innerHTML = '❌ المفتاح مُعطل';
        resultDiv.style.color = '#ff4444';
        return;
    }
    
    const now = new Date();
    const expires = new Date(license.expires_at);
    if (now > expires) {
        resultDiv.innerHTML = '⏰ المفتاح منتهي الصلاحية';
        resultDiv.style.color = '#ffbb33';
        return;
    }
    
    // التحقق من عدد الأجهزة
    const devices = license.devices || [];
    if (devices.length >= license.max_devices && !devices.includes(deviceId)) {
        resultDiv.innerHTML = `⚠️ تجاوزت الحد المسموح (${license.max_devices} أجهزة)`;
        resultDiv.style.color = '#ffbb33';
        return;
    }
    
    // تسجيل الجهاز إذا كان جديداً
    if (!devices.includes(deviceId) && deviceId !== 'unknown') {
        devices.push(deviceId);
        license.devices = devices;
        license.used_count = (license.used_count || 0) + 1;
        saveLicenses(licenses);
        renderTable();
        updateStats();
    }
    
    resultDiv.innerHTML = `
        ✅ <strong>مفتاح صالح!</strong><br>
        📱 التطبيق: ${license.app_name}<br>
        🖥️ الأجهزة: ${devices.length}/${license.max_devices}<br>
        📅 ينتهي: ${new Date(license.expires_at).toLocaleDateString('ar')}
    `;
    resultDiv.style.color = '#00c851';
    showToast('✅ مفتاح صالح!');
}

// ============================================================
//  📋  عرض قائمة المفاتيح
// ============================================================

function renderTable() {
    const licenses = getLicenses();
    const container = document.getElementById('keysTable');
    
    if (licenses.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>لا توجد مفاتيح بعد</p>
            </div>
        `;
        return;
    }
    
    let html = `
        <table>
            <thead>
                <tr>
                    <th>المفتاح</th>
                    <th>التطبيق</th>
                    <th>الأجهزة</th>
                    <th>الحالة</th>
                    <th>الصلاحية</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    licenses.forEach(l => {
        const now = new Date();
        const expires = new Date(l.expires_at);
        let status = l.status;
        if (status === 'active' && now > expires) status = 'expired';
        
        const statusClass = status === 'active' ? 'status-active' : 
                           status === 'expired' ? 'status-expired' : 'status-inactive';
        const statusText = status === 'active' ? '🟢 نشط' :
                          status === 'expired' ? '🟡 منتهي' : '🔴 معطل';
        const devices = (l.devices || []).length;
        
        html += `
            <tr>
                <td><span class="badge">${l.key}</span></td>
                <td>${l.app_name}</td>
                <td>${devices}/${l.max_devices}</td>
                <td class="${statusClass}">${statusText}</td>
                <td style="font-size:12px;">${new Date(l.expires_at).toLocaleDateString('ar')}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteLicense('${l.id}')">🗑️</button>
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

function deleteLicense(id) {
    if (!confirm('هل أنت متأكد من حذف هذا المفتاح؟')) return;
    let licenses = getLicenses();
    licenses = licenses.filter(l => l.id !== id);
    saveLicenses(licenses);
    renderTable();
    updateStats();
    showToast('🗑️ تم حذف المفتاح');
}

function clearAllKeys() {
    if (!confirm('⚠️ هل أنت متأكد من حذف جميع المفاتيح؟')) return;
    saveLicenses([]);
    renderTable();
    updateStats();
    showToast('🗑️ تم حذف جميع المفاتيح');
}

// ============================================================
//  📊  إحصائيات
// ============================================================

function updateStats() {
    const licenses = getLicenses();
    const total = licenses.length;
    const active = licenses.filter(l => l.status === 'active').length;
    const expired = licenses.filter(l => new Date(l.expires_at) < new Date()).length;
    const totalDevices = licenses.reduce((sum, l) => sum + (l.devices || []).length, 0);
    
    document.getElementById('statsContent').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
            <div style="background:rgba(0,212,255,0.05);padding:20px;border-radius:12px;text-align:center;">
                <div style="font-size:28px;color:#00d4ff;">${total}</div>
                <div style="color:#8899bb;font-size:13px;">إجمالي المفاتيح</div>
            </div>
            <div style="background:rgba(0,200,81,0.05);padding:20px;border-radius:12px;text-align:center;">
                <div style="font-size:28px;color:#00c851;">${active}</div>
                <div style="color:#8899bb;font-size:13px;">مفاتيح نشطة</div>
            </div>
            <div style="background:rgba(255,187,51,0.05);padding:20px;border-radius:12px;text-align:center;">
                <div style="font-size:28px;color:#ffbb33;">${expired}</div>
                <div style="color:#8899bb;font-size:13px;">منتهية الصلاحية</div>
            </div>
            <div style="background:rgba(123,47,252,0.05);padding:20px;border-radius:12px;text-align:center;">
                <div style="font-size:28px;color:#7b2ffc;">${totalDevices}</div>
                <div style="color:#8899bb;font-size:13px;">الأجهزة المسجلة</div>
            </div>
        </div>
    `;
}

// ============================================================
//  📤  تصدير / استيراد
// ============================================================

function exportKeys() {
    const licenses = getLicenses();
    const data = JSON.stringify(licenses, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `licenses_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 تم التصدير بنجاح');
}

function importKeys() {
    const fileInput = document.getElementById('importFile');
    if (!fileInput.files || fileInput.files.length === 0) {
        showToast('⚠️ الرجاء اختيار ملف');
        return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error('البيانات غير صالحة');
            saveLicenses(data);
            renderTable();
            updateStats();
            showToast(`📤 تم استيراد ${data.length} مفتاح`);
        } catch (err) {
            showToast('❌ الملف غير صالح');
        }
    };
    reader.readAsText(fileInput.files[0]);
}

// ============================================================
//  🧭  التنقل بين التبويبات
// ============================================================

function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.getElementById(`tab-${tab}`).style.display = 'block';
    
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    
    if (tab === 'list') renderTable();
    if (tab === 'stats') updateStats();
}

// ============================================================
//  💬  Toast notification
// ============================================================

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => {
        toast.style.display = 'none';
    }, 2500);
}

// ============================================================
//  🚀  تشغيل أولي
// ============================================================

// إضافة بعض البيانات التجريبية
function addDemoData() {
    const licenses = getLicenses();
    if (licenses.length === 0) {
        const demo = [
            {
                id: generateId(),
                key: 'ABCD-1234-EFGH-5678',
                app_name: 'تطبيق تجريبي',
                max_devices: 2,
                status: 'active',
                created_at: new Date().toISOString(),
                expires_at: new Date(Date.now() + 365*24*60*60*1000).toISOString(),
                used_count: 1,
                devices: ['device_001']
            }
        ];
        saveLicenses(demo);
    }
}

addDemoData();
renderTable();
updateStats();

console.log('🔑 نظام إدارة أكواد التفعيل جاهز!');
</script>

</body>
</html>
