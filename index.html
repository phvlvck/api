<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام إدارة الاشتراكات - SmartApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        /* ============================================
           الأنماط - CSS
           ============================================ */
        
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #141b2b;
            --bg-card: #1a2332;
            --bg-hover: #243044;
            --text-primary: #e8edf5;
            --text-secondary: #8b9bb5;
            --accent-primary: #4f8cff;
            --accent-secondary: #00d4ff;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --border: #2a3a52;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --transition: all 0.3s ease;
        }

        .light-theme {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e8ecf1;
            --text-primary: #1a2332;
            --text-secondary: #5a6b85;
            --border: #d0d8e0;
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            min-height: 100vh;
        }

        /* ===== شريط التنقل ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .nav-brand i {
            font-size: 28px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .user-profile i {
            font-size: 24px;
            color: var(--accent-primary);
        }

        /* ===== القائمة الجانبية ===== */
        .main-container {
            display: flex;
            min-height: calc(100vh - 73px);
        }

        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 24px 0;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            border-right: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-hover);
            color: var(--accent-primary);
            border-right-color: var(--accent-primary);
        }

        .nav-item i {
            width: 22px;
            text-align: center;
            font-size: 18px;
        }

        /* ===== المحتوى ===== */
        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        /* ===== بطاقات الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .stat-card .label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card .change {
            font-size: 13px;
            color: var(--success);
            margin-top: 4px;
        }

        .stat-card .change.danger {
            color: var(--danger);
        }

        /* ===== الجداول ===== */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 20px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }

        .table-header .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .table-header input,
        .table-header select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        .table-header input:focus,
        .table-header select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 12px 20px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tr:hover td {
            background: var(--bg-hover);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(46, 213, 115, 0.2);
            color: var(--success);
        }

        .status-badge.inactive,
        .status-badge.expired {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .status-badge.pending {
            background: rgba(255, 165, 2, 0.2);
            color: var(--warning);
        }

        .status-badge.suspended {
            background: rgba(255, 165, 2, 0.2);
            color: var(--warning);
        }

        .status-badge.blocked {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        /* ===== الأزرار ===== */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        /* ===== النوافذ المنبثقة ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group .checkbox-group input[type="checkbox"] {
            width: auto;
            width: 18px;
            height: 18px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* ===== رسائل ===== */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background: rgba(46, 213, 115, 0.15);
            color: var(--success);
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .alert-danger {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .alert-warning {
            background: rgba(255, 165, 2, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 165, 2, 0.3);
        }

        .alert-info {
            background: rgba(79, 140, 255, 0.15);
            color: var(--accent-primary);
            border: 1px solid rgba(79, 140, 255, 0.3);
        }

        /* ===== شاشة التحميل ===== */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            gap: 12px;
        }

        .loading-spinner i {
            font-size: 32px;
            color: var(--accent-primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== كود الترخيص ===== */
        .license-code {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: var(--accent-secondary);
            letter-spacing: 1px;
            direction: ltr;
        }

        /* ===== شكل الـ Form ===== */
        .form-card {
            max-width: 550px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .form-card h2 {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            justify-content: center;
        }

        /* ===== استجابة ===== */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 72px;
                padding: 16px 0;
            }
            
            .sidebar .nav-item span {
                display: none;
            }
            
            .sidebar .nav-item {
                justify-content: center;
                padding: 14px;
            }
            
            .content {
                padding: 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .navbar {
                padding: 12px 16px;
            }
            
            .nav-brand span {
                font-size: 16px;
            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
            }

            .table-header .filters {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .user-profile span {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
    الهيكل - HTML
    ============================================ -->

    <div id="app">
        <!-- شريط التنقل -->
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-cube"></i>
                <span>مدير الاشتراكات</span>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="icon-btn" title="تبديل الوضع">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-profile">
                    <span id="userName">المطور</span>
                    <i class="fas fa-user-circle"></i>
                    <button id="logoutBtn" class="btn btn-danger btn-sm" style="display:none;">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <div class="main-container">
            <!-- القائمة الجانبية -->
            <aside class="sidebar" id="sidebar">
                <ul class="nav-menu">
                    <li class="nav-item active" data-page="dashboard">
                        <i class="fas fa-chart-pie"></i>
                        <span>لوحة التحكم</span>
                    </li>
                    <li class="nav-item" data-page="subscriptions">
                        <i class="fas fa-key"></i>
                        <span>الاشتراكات</span>
                    </li>
                    <li class="nav-item" data-page="devices">
                        <i class="fas fa-mobile-alt"></i>
                        <span>الأجهزة</span>
                    </li>
                    <li class="nav-item" data-page="create">
                        <i class="fas fa-plus-circle"></i>
                        <span>إنشاء اشتراك</span>
                    </li>
                </ul>
            </aside>

            <!-- المحتوى -->
            <main class="content" id="content">
                <!-- سيتم تحميل المحتوى هنا بواسطة JavaScript -->
            </main>
        </div>
    </div>

    <!-- ============================================
    نافذة تسجيل الدخول المنبثقة
    ============================================ -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2><i class="fas fa-lock" style="color:var(--accent-primary);"></i> تسجيل الدخول</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required placeholder="admin@smartapp.com" value="admin@smartapp.com" />
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" value="password123" />
                </div>
                <div id="loginError" class="alert alert-danger" style="display:none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>فشل تسجيل الدخول. تحقق من البريد وكلمة المرور.</span>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================
    نافذة إنشاء اشتراك
    ============================================ -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2><i class="fas fa-plus-circle" style="color:var(--success);"></i> إنشاء اشتراك جديد</h2>
            <form id="createForm">
                <div class="form-group">
                    <label>الباقة</label>
                    <select id="packageName" required>
                        <option value="basic">Basic</option>
                        <option value="premium" selected>Premium</option>
                        <option value="pro">Pro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>عدد الأجهزة</label>
                    <input type="number" id="maxDevices" value="3" min="1" max="10" required />
                </div>
                <div class="form-group">
                    <label>المدة (أيام)</label>
                    <input type="number" id="duration" value="30" min="1" required />
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="autoRenew" />
                        <label style="margin:0;">تجديد تلقائي</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>معرف المستخدم (User ID)</label>
                    <input type="text" id="userId" placeholder="أدخل User ID" required value="demo-user-id" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal('createModal')">إلغاء</button>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-plus"></i> إنشاء
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================
    JavaScript - المنطق
    ============================================ -->
    <script>
        // ============================================
        // نظام إدارة الاشتراكات - JavaScript
        // ============================================

        class SubscriptionManager {
            constructor() {
                this.currentPage = 'dashboard';
                this.isLoggedIn = false;
                this.user = null;
                this.token = localStorage.getItem('auth_token');
                this.subscriptions = [];
                this.devices = [];
                this.stats = {};
                this.init();
            }

            // ============================================
            // التهيئة
            // ============================================
            init() {
                this.loadTheme();
                this.setupEventListeners();
                this.checkAuth();
                this.navigateTo('dashboard');
                this.startHeartbeat();
            }

            // ============================================
            // إعدادات الوضع
            // ============================================
            loadTheme() {
                const saved = localStorage.getItem('theme') || 'dark';
                document.documentElement.className = saved === 'dark' ? '' : 'light-theme';
                const icon = document.querySelector('#themeToggle i');
                if (icon) {
                    icon.className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
                }
            }

            toggleTheme() {
                const isLight = document.documentElement.classList.contains('light-theme');
                document.documentElement.classList.toggle('light-theme');
                localStorage.setItem('theme', isLight ? 'dark' : 'light');
                this.loadTheme();
            }

            // ============================================
            // الأحداث
            // ============================================
            setupEventListeners() {
                // تبديل الوضع
                document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());

                // التنقل
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const page = item.dataset.page;
                        this.navigateTo(page);
                    });
                });

                // تسجيل الخروج
                document.getElementById('logoutBtn').addEventListener('click', () => this.logout());

                // نموذج تسجيل الدخول
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                // نموذج إنشاء اشتراك
                document.getElementById('createForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleCreateSubscription();
                });

                // إغلاق النوافذ عند الضغط خارجها
                document.querySelectorAll('.modal-overlay').forEach(modal => {
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) {
                            modal.classList.remove('active');
                        }
                    });
                });
            }

            // ============================================
            // المصادقة
            // ============================================
            checkAuth() {
                if (this.token) {
                    this.isLoggedIn = true;
                    this.user = JSON.parse(localStorage.getItem('user') || '{}');
                    document.getElementById('userName').textContent = this.user.name || 'المطور';
                    document.getElementById('logoutBtn').style.display = 'inline-flex';
                    document.getElementById('loginModal').classList.remove('active');
                } else {
                    this.isLoggedIn = false;
                    document.getElementById('userName').textContent = 'زائر';
                    document.getElementById('logoutBtn').style.display = 'none';
                    document.getElementById('loginModal').classList.add('active');
                }
            }

            async handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');

                errorEl.style.display = 'none';

                if (!email || !password) {
                    errorEl.style.display = 'flex';
                    errorEl.querySelector('span').textContent = 'الرجاء إدخال البريد وكلمة المرور';
                    return;
                }

                try {
                    // محاكاة تسجيل الدخول (للاختبار)
                    if (email === 'admin@smartapp.com' && password === 'password123') {
                        this.isLoggedIn = true;
                        this.user = { id: 'admin-1', name: 'المطور الرئيسي', email: 'admin@smartapp.com', role: 'admin' };
                        this.token = 'demo-token-123456';
                        
                        localStorage.setItem('auth_token', this.token);
                        localStorage.setItem('user', JSON.stringify(this.user));
                        
                        document.getElementById('userName').textContent = this.user.name;
                        document.getElementById('logoutBtn').style.display = 'inline-flex';
                        document.getElementById('loginModal').classList.remove('active');
                        
                        this.navigateTo('dashboard');
                        this.showToast('✅ مرحباً بك يا ' + this.user.name, 'success');
                    } else {
                        errorEl.style.display = 'flex';
                        errorEl.querySelector('span').textContent = '❌ البريد أو كلمة المرور غير صحيحة';
                    }
                } catch (error) {

            async handleCreateSubscription() {
                const userId = document.getElementById('userId').value;
                const packageName = document.getElementById('packageName').value;
                const maxDevices = parseInt(document.getElementById('maxDevices').value);
                const duration = parseInt(document.getElementById('duration').value);
                const autoRenew = document.getElementById('autoRenew').checked;

                if (!userId) {
                    this.showToast('❌ الرجاء إدخال User ID', 'danger');
                    return;
                }

                // إنشاء مفتاح عشوائي
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let key = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        key += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    if (i < 3) key += '-';
                }
                const licenseKey = packageName.toUpperCase() + '-' + key;

                const newSubscription = {
                    id: 'sub-' + Date.now(),
                    license_key: licenseKey,
                    package_name: packageName,
                    user: { name: 'مستخدم جديد', email: userId + '@test.com' },
                    max_devices: maxDevices,
                    devices_count: 0,
                    start_date: new Date().toISOString(),
                    end_date: new Date(Date.now() + duration * 24 * 60 * 60 * 1000).toISOString(),
                    status: 'active'
                };

                this.subscriptions.push(newSubscription);
                this.showToast(`✅ تم إنشاء الاشتراك بنجاح!\nالمفتاح: ${licenseKey}`, 'success');
                closeModal('createModal');
                this.navigateTo('subscriptions');
            }

            async handleCreateSubscriptionPage() {
                const userId = document.getElementById('userIdPage').value;
                const packageName = document.getElementById('packageNamePage').value;
                const maxDevices = parseInt(document.getElementById('maxDevicesPage').value);
                const duration = parseInt(document.getElementById('durationPage').value);
                const autoRenew = document.getElementById('autoRenewPage').checked;

                if (!userId) {
                    this.showToast('❌ الرجاء إدخال User ID', 'danger');
                    return;
                }

                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let key = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        key += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    if (i < 3) key += '-';
                }
                const licenseKey = packageName.toUpperCase() + '-' + key;

                const newSubscription = {
                    id: 'sub-' + Date.now(),
                    license_key: licenseKey,
                    package_name: packageName,
                    user: { name: 'مستخدم جديد', email: userId + '@test.com' },
                    max_devices: maxDevices,
                    devices_count: 0,
                    start_date: new Date().toISOString(),
                    end_date: new Date(Date.now() + duration * 24 * 60 * 60 * 1000).toISOString(),
                    status: 'active'
                };

                this.subscriptions.push(newSubscription);
                this.showToast(`✅ تم إنشاء الاشتراك بنجاح!\nالمفتاح: ${licenseKey}`, 'success');
                this.navigateTo('subscriptions');
            }

            renewSubscription(id) {
                if (!confirm('هل تريد تجديد هذا الاشتراك لمدة 30 يوماً؟')) return;
                
                const sub = this.subscriptions.find(s => s.id === id);
                if (sub) {
                    sub.end_date = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();
                    sub.status = 'active';
                    this.showToast('✅ تم تجديد الاشتراك بنجاح', 'success');
                    this.navigateTo('subscriptions');
                }
            }

            deleteSubscription(id) {
                if (!confirm('هل أنت متأكد من حذف هذا الاشتراك؟')) return;
                
                this.subscriptions = this.subscriptions.filter(s => s.id !== id);
                this.showToast('✅ تم حذف الاشتراك', 'info');
                this.navigateTo('subscriptions');
            }

            blockDevice(id) {
                if (!confirm('هل تريد حظر هذا الجهاز؟')) return;
                
                const device = this.devices.find(d => d.id === id);
                if (device) {
                    device.status = 'blocked';
                    this.showToast('✅ تم حظر الجهاز', 'warning');
                    this.navigateTo('devices');
                }
            }

            unblockDevice(id) {
                const device = this.devices.find(d => d.id === id);
                if (device) {
                    device.status = 'active';
                    this.showToast('✅ تم إلغاء حظر الجهاز', 'success');
                    this.navigateTo('devices');
                }
            }

            resetDevice(id) {
                if (!confirm('سيتم إعادة تعيين هذا الجهاز. هل أنت متأكد؟')) return;
                
                const device = this.devices.find(d => d.id === id);
                if (device) {
                    device.status = 'inactive';
                    device.last_seen = new Date().toISOString();
                    this.showToast('✅ تم إعادة تعيين الجهاز', 'info');
                    this.navigateTo('devices');
                }
            }

            // ============================================
            // أدوات مساعدة
            // ============================================
            translateStatus(status) {
                const map = {
                    active: 'نشط',
                    inactive: 'غير نشط',
                    expired: 'منتهي',
                    pending: 'قيد الانتظار',
                    banned: 'محظور',
                    blocked: 'محظور',
                    suspended: 'موقوف',
                    reset: 'معاد تعيينه'
                };
                return map[status] || status;
            }

            formatTime(timestamp) {
                if (!timestamp) return 'غير معروف';
                const date = new Date(timestamp);
                const now = new Date();
                const diff = Math.floor((now - date) / 1000);
                
                if (diff < 60) return 'الآن';
                if (diff < 3600) return `${Math.floor(diff / 60)} دقيقة`;
                if (diff < 86400) return `${Math.floor(diff / 3600)} ساعة`;
                if (diff < 604800) return `${Math.floor(diff / 86400)} يوم`;
                return date.toLocaleDateString('ar-EG');
            }

            showToast(message, type = 'info') {
                const existing = document.querySelector('.toast-notification');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = `toast-notification alert alert-${type}`;
                toast.style.cssText = `
                    position: fixed;
                    bottom: 30px;
                    right: 30px;
                    z-index: 9999;
                    max-width: 400px;
                    padding: 16px 24px;
                    border-radius: 12px;
                    background: var(--bg-card);
                    border: 1px solid var(--border);
                    box-shadow: var(--shadow);
                    animation: slideIn 0.3s ease;
                `;

                const colors = {
                    success: '#2ed573',
                    danger: '#ff4757',
                    warning: '#ffa502',
                    info: '#4f8cff'
                };

                toast.style.borderRight = `4px solid ${colors[type] || '#4f8cff'}`;
                toast.innerHTML = `
                    <div style="display:flex;align-items:center;gap:10px;color:var(--text-primary);">
                        <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'}" 
                           style="color:${colors[type] || '#4f8cff'};font-size:20px;"></i>
                        <span style="font-size:14px;white-space:pre-line;">${message}</span>
                    </div>
                `;

                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 300);
                }, 5000);
            }

            startHeartbeat() {
                setInterval(() => {
                    if (this.isLoggedIn) {
                        console.log('💓 نبض القلب:', new Date().toISOString());
                    }
                }, 30000);
            }
        }

        // ============================================
        // دوال مساعدة للـ HTML
        // ============================================
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ============================================
        // تشغيل التطبيق
        // ============================================
        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new SubscriptionManager();
            window.app = app;
        });

        // إضافة أنماط إضافية للـ Toast
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .toast-notification {
                transition: all 0.3s ease;
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
