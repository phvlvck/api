<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام إدارة الاشتراكات - SmartApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        /* ===== جميع الأنماط CSS ===== */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #141b2b;
            --bg-card: #1a2332;
            --bg-hover: #243044;
            --text-primary: #e8edf5;
            --text-secondary: #8b9bb5;
            --accent-primary: #4f8cff;
            --accent-secondary: #00d4ff;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --border: #2a3a52;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .light-theme {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e8ecf1;
            --text-primary: #1a2332;
            --text-secondary: #5a6b85;
            --border: #d0d8e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        /* ===== شريط التنقل ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .user-profile i {
            font-size: 24px;
            color: var(--accent-primary);
        }

        /* ===== القائمة الجانبية ===== */
        .main-container {
            display: flex;
            min-height: calc(100vh - 73px);
        }

        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 24px 0;
            flex-shrink: 0;
        }

        .nav-menu { list-style: none; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            cursor: pointer;
            color: var(--text-secondary);
            border-right: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-hover);
            color: var(--accent-primary);
            border-right-color: var(--accent-primary);
        }

        .nav-item i { width: 22px; text-align: center; }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        /* ===== البطاقات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .stat-card .label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card .sub {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }

        /* ===== الجداول ===== */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 20px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }

        .table-header .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .table-header input,
        .table-header select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 6px;
            font-family: inherit;
        }

        .table-header input:focus,
        .table-header select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 12px 20px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td { background: var(--bg-hover); }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(46, 213, 115, 0.2);
            color: var(--success);
        }

        .status-badge.expired {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .status-badge.suspended {
            background: rgba(255, 165, 2, 0.2);
            color: var(--warning);
        }

        .status-badge.blocked {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
        }

        .license-code {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: var(--accent-secondary);
            direction: ltr;
        }

        /* ===== الأزرار ===== */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-warning { background: var(--warning); color: white; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }

        /* ===== النوافذ المنبثقة ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 { margin-bottom: 20px; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .form-group .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-danger {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .alert-success {
            background: rgba(46, 213, 115, 0.15);
            color: var(--success);
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .form-card {
            max-width: 550px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .form-card .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            justify-content: center;
        }

        /* ===== التوست ===== */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            max-width: 400px;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 72px;
                padding: 16px 0;
            }
            .sidebar .nav-item span { display: none; }
            .sidebar .nav-item { justify-content: center; padding: 14px; }
            .content { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .navbar { padding: 12px 16px; }
            .table-header { flex-direction: column; align-items: stretch; }
            .table-header .filters { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .user-profile span { display: none; }
        }
    </style>
</head>
<body>

    <!-- ===== الهيكل ===== -->
    <div id="app">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-cube"></i>
                <span>مدير الاشتراكات</span>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="icon-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-profile">
                    <span id="userName">المطور</span>
                    <i class="fas fa-user-circle"></i>
                    <button id="logoutBtn" class="btn btn-danger btn-sm" style="display:none;">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <div class="main-container">
            <aside class="sidebar">
                <ul class="nav-menu">
                    <li class="nav-item active" data-page="dashboard">
                        <i class="fas fa-chart-pie"></i>
                        <span>لوحة التحكم</span>
                    </li>
                    <li class="nav-item" data-page="subscriptions">
                        <i class="fas fa-key"></i>
                        <span>الاشتراكات</span>
                    </li>
                    <li class="nav-item" data-page="devices">
                        <i class="fas fa-mobile-alt"></i>
                        <span>الأجهزة</span>
                    </li>
                    <li class="nav-item" data-page="create">
                        <i class="fas fa-plus-circle"></i>
                        <span>إنشاء اشتراك</span>
                    </li>
                    <li class="nav-item" data-page="settings">
                        <i class="fas fa-cog"></i>
                        <span>الإعدادات</span>
                    </li>
                </ul>
            </aside>

            <main class="content" id="content">
                <!-- سيتم تحميل المحتوى هنا -->
            </main>
        </div>
    </div>

    <!-- ===== نافذة تسجيل الدخول ===== -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2><i class="fas fa-lock" style="color:var(--accent-primary);"></i> تسجيل الدخول</h2>
            <form id="loginForm">
                <div id="loginStatus" style="display:none;" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="loginErrorMsg">فشل تسجيل الدخول</span>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required placeholder="admin@smartapp.com" />
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" />
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== نافذة إنشاء اشتراك ===== -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2><i class="fas fa-plus-circle" style="color:var(--success);"></i> إنشاء اشتراك جديد</h2>
            <form id="createForm">
                <div class="form-group">
                    <label>الباقة</label>
                    <select id="packageName" required>
                        <option value="basic">Basic</option>
                        <option value="premium">Premium</option>
                        <option value="pro">Pro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>عدد الأجهزة</label>
                    <input type="number" id="maxDevices" value="3" min="1" max="10" required />
                </div>
                <div class="form-group">
                    <label>المدة (أيام)</label>
                    <input type="number" id="duration" value="30" min="1" required />
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="autoRenew" />
                        <label style="margin:0;">تجديد تلقائي</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>معرف المستخدم (User ID)</label>
                    <input type="text" id="userId" placeholder="أدخل User ID" required />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal('createModal')">إلغاء</button>
                    <button type="submit" class="btn btn-success"><i class="fas fa-plus"></i> إنشاء</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== JavaScript ===== -->
    <script>
        // ============================================
        // التطبيق الرئيسي - متصل بالخادم الحقيقي
        // ============================================

        class SubscriptionManager {
            constructor() {
                // ===== الإعدادات =====
                // غيّر هذا الرابط إلى رابط Netlify الخاص بك
                this.API_BASE = window.location.origin + '/.netlify/functions/api';
                
                this.currentPage = 'dashboard';
                this.isLoggedIn = false;
                this.user = null;
                this.token = localStorage.getItem('auth_token');
                this.subscriptions = [];
                this.devices = [];
                this.stats = {};
                this.loading = false;
                this.init();
            }

            // ============================================
            // التهيئة
            // ============================================
            init() {
                this.loadTheme();
                this.setupEventListeners();
                this.checkAuth();
                this.navigateTo('dashboard');
                this.startHeartbeat();
            }

            // ============================================
            // طلبات API
            // ============================================
            async apiRequest(endpoint, method = 'GET', data = null) {
                const url = `${this.API_BASE}${endpoint}`;
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };

                if (this.token) {
                    options.headers['Authorization'] = `Bearer ${this.token}`;
                }

                if (data) {
                    options.body = JSON.stringify(data);
                }

                try {
                    const response = await fetch(url, options);
                    const result = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(result.error || 'خطأ في الطلب');
                    }
                    
                    return result;
                } catch (error) {
                    console.error('API Error:', error);
                    throw error;
                }
            }

            // ============================================
            // المصادقة
            // ============================================
            checkAuth() {
                if (this.token) {
                    this.isLoggedIn = true;
                    const userData = localStorage.getItem('user');
                    if (userData) {
                        this.user = JSON.parse(userData);
                        document.getElementById('userName').textContent = this.user.name || 'المطور';
                        document.getElementById('logoutBtn').style.display = 'inline-flex';
                    }
                    document.getElementById('loginModal').classList.remove('active');
                } else {
                    this.isLoggedIn = false;
                    document.getElementById('userName').textContent = 'زائر';
                    document.getElementById('logoutBtn').style.display = 'none';
                    document.getElementById('loginModal').classList.add('active');
                }
            }

            async handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const statusEl = document.getElementById('loginStatus');
                const errorMsg = document.getElementById('loginErrorMsg');

                statusEl.style.display = 'none';

                if (!email || !password) {
                    statusEl.style.display = 'flex';
                    errorMsg.textContent = 'الرجاء إدخال البريد وكلمة المرور';
                    return;
                }

                try {
                    const result = await this.apiRequest('/login', 'POST', { email, password });
                    
                    this.token = result.token;
                    this.user = result.user;
                    this.isLoggedIn = true;
                    
                    localStorage.setItem('auth_token', this.token);
                    localStorage.setItem('user', JSON.stringify(this.user));
                    
                    document.getElementById('userName').textContent = this.user.name;
                    document.getElementById('logoutBtn').style.display = 'inline-flex';
                    document.getElementById('loginModal').classList.remove('active');
                    
                    this.showToast(`✅ مرحباً ${this.user.name}`, 'success');
                    this.navigateTo('dashboard');
                    
                } catch (error) {
                    statusEl.style.display = 'flex';
                    errorMsg.textContent = error.message || 'فشل تسجيل الدخول';
                }
            }

            logout() {
                this.isLoggedIn = false;
                this.user = null;
                this.token = null;
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user');
                document.getElementById('userName').textContent = 'زائر';
                document.getElementById('logoutBtn').style.display = 'none';
                document.getElementById('loginModal').classList.add('active');
                this.showToast('تم تسجيل الخروج', 'info');
            }

            // ============================================
            // جلب البيانات من الخادم
            // ============================================
            async fetchData() {
                if (this.loading) return;
                this.loading = true;

                try {
                    // جلب الإحصائيات
                    const statsResult = await this.apiRequest('/stats');
                    this.stats = statsResult;

                    // جلب الاشتراكات
                    const subsResult = await this.apiRequest('/subscriptions');
                    this.subscriptions = subsResult || [];

                    // جلب الأجهزة
                    const devicesResult = await this.apiRequest('/devices');
                    this.devices = devicesResult || [];

                } catch (error) {
                    console.error('خطأ في جلب البيانات:', error);
                    this.showToast('❌ خطأ في جلب البيانات من الخادم', 'danger');
                } finally {
                    this.loading = false;
                }
            }

            // ============================================
            // التنقل بين الصفحات
            // ============================================
            navigateTo(page) {
                this.currentPage = page;
                
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.page === page);
                });

                const content = document.getElementById('content');
                
                switch(page) {
                    case 'dashboard':
                        this.renderDashboard(content);
                        break;
                    case 'subscriptions':
                        this.renderSubscriptions(content);
                        break;
                    case 'devices':
                        this.renderDevices(content);
                        break;
                    case 'create':
                        this.renderCreate(content);
                        break;
                    case 'settings':
                        this.renderSettings(content);
                        break;
                    default:
                        content.innerHTML = '<h2>الصفحة غير موجودة</h2>';
                }
            }

            // ============================================
            // عرض لوحة التحكم
            // ============================================
            async renderDashboard(container) {
                container.innerHTML = `
                    <div class="loading-spinner" style="display:flex;justify-content:center;padding:60px;gap:12px;">
                        <i class="fas fa-spinner fa-spin" style="font-size:32px;color:var(--accent-primary);"></i>
                        <span style="color:var(--text-secondary);">جاري التحميل...</span>
                    </div>
                `;

                await this.fetchData();

                container.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="label">👥 المستخدمين</div>
                            <div class="value">${this.stats.users || 0}</div>
                            <div class="sub">${this.stats.activeUsers || 0} نشط</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">🔑 الاشتراكات النشطة</div>
                            <div class="value">${this.stats.activeSubscriptions || 0}</div>
                            <div class="sub">إجمالي: ${this.stats.subscriptions || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">📱 الأجهزة النشطة</div>
                            <div class="value">${this.stats.activeDevices || 0}</div>
                            <div class="sub">إجمالي: ${this.stats.devices || 0}</div>
                        </div>
                        <div class="stat-card">

            renderPackageDistribution() {
                const packages = {};
                this.subscriptions.forEach(s => {
                    packages[s.package_name] = (packages[s.package_name] || 0) + 1;
                });
                
                const colors = { basic: '#4f8cff', premium: '#2ed573', pro: '#ffa502' };
                const total = Object.values(packages).reduce((a, b) => a + b, 0);
                
                if (total === 0) {
                    return '<p style="color:var(--text-secondary);">لا توجد اشتراكات</p>';
                }
                
                return Object.entries(packages).map(([name, count]) => {
                    const percentage = Math.round((count / total) * 100);
                    return `
                        <div style="margin-bottom:12px;">
                            <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px;">
                                <span style="text-transform:capitalize;">${name}</span>
                                <span>${count} (${percentage}%)</span>
                            </div>
                            <div style="background:var(--bg-primary);border-radius:10px;height:20px;overflow:hidden;">
                                <div style="height:100%;width:${percentage}%;background:${colors[name] || '#4f8cff'};border-radius:10px;transition:width 0.5s ease;"></div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // ============================================

            async handleCreateSubscription() {
                const userId = document.getElementById('userId').value;
                const packageName = document.getElementById('packageName').value;
                const maxDevices = parseInt(document.getElementById('maxDevices').value);
                const duration = parseInt(document.getElementById('duration').value);
                const autoRenew = document.getElementById('autoRenew').checked;

                if (!userId) {
                    this.showToast('❌ الرجاء إدخال User ID', 'danger');
                    return;
                }

                try {
                    const result = await this.apiRequest('/subscriptions/create', 'POST', {
                        userId,
                        packageName,
                        maxDevices,
                        duration,
                        autoRenew
                    });

                    this.showToast(`✅ تم إنشاء الاشتراك بنجاح!\nالمفتاح: ${result.subscription.license_key}`, 'success');
                    closeModal('createModal');
                    await this.fetchData();
                    this.navigateTo('subscriptions');
                    
                } catch (error) {
                    this.showToast(`❌ فشل إنشاء الاشتراك: ${error.message}`, 'danger');
                }
            }

            async handleCreateSubscriptionPage() {
                const userId = document.getElementById('userIdPage').value;
                const packageName = document.getElementById('packageNamePage').value;
                const maxDevices = parseInt(document.getElementById('maxDevicesPage').value);
                const duration = parseInt(document.getElementById('durationPage').value);
                const autoRenew = document.getElementById('autoRenewPage').checked;

                if (!userId) {
                    this.showToast('❌ الرجاء إدخال User ID', 'danger');
                    return;
                }

                try {
                    const result = await this.apiRequest('/subscriptions/create', 'POST', {
                        userId,
                        packageName,
                        maxDevices,
                        duration,
                        autoRenew
                    });

                    this.showToast(`✅ تم إنشاء الاشتراك بنجاح!\nالمفتاح: ${result.subscription.license_key}`, 'success');
                    await this.fetchData();
                    this.navigateTo('subscriptions');
                    
                } catch (error) {
                    this.showToast(`❌ فشل إنشاء الاشتراك: ${error.message}`, 'danger');
                }
            }

            async renewSubscription(id) {
                if (!confirm('هل تريد تجديد هذا الاشتراك؟')) return;

                try {
                    await this.apiRequest('/subscriptions/renew', 'POST', {
                        subscriptionId: id,
                        duration: 30
                    });
                    
                    this.showToast('✅ تم تجديد الاشتراك بنجاح', 'success');
                    await this.fetchData();
                    this.navigateTo('subscriptions');
                    
                } catch (error) {
                    this.showToast(`❌ فشل تجديد الاشتراك: ${error.message}`, 'danger');
                }
            }

            async deleteSubscription(id) {
                if (!confirm('هل أنت متأكد من حذف هذا الاشتراك؟')) return;

                try {
                    await this.apiRequest(`/subscriptions/${id}`, 'DELETE');
                    this.showToast('✅ تم حذف الاشتراك', 'info');
                    await this.fetchData();
                    this.navigateTo('subscriptions');
                    
                } catch (error) {
                    this.showToast(`❌ فشل حذف الاشتراك: ${error.message}`, 'danger');
                }
            }

                    this.showToast('✅ تم حظر الجهاز', 'warning');

            setupEventListeners() {

                });

                        }
                    });

            // ============================================
            // أدوات مساعدة
            // ============================================
            loadTheme() {
                const saved = localStorage.getItem('theme') || 'dark';
                document.documentElement.className = saved === 'dark' ? '' : 'light-theme';
                const icon = document.querySelector('#themeToggle i');
                if (icon) {
                    icon.className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
                }
            }

            toggleTheme() {
                const isLight = document.documentElement.classList.contains('light-theme');
                document.documentElement.classList.toggle('light-theme');
                localStorage.setItem('theme', isLight ? 'dark' : 'light');
                this.loadTheme();
            }

            translateStatus(status) {
                const map = {
                    active: 'نشط',
                    inactive: 'غير نشط',
                    expired: 'منتهي',
                    pending: 'قيد الانتظار',
                    banned: 'محظور',
                    blocked: 'محظور',
                    suspended: 'موقوف',
                    reset: 'معاد تعيينه'
                };
                return map[status] || status;
            }

            formatTime(timestamp) {
                if (!timestamp) return 'غير معروف';
                const date = new Date(timestamp);
                const now = new Date();
                const diff = Math.floor((now - date) / 1000);
                
                if (diff < 60) return 'الآن';
                if (diff < 3600) return `${Math.floor(diff / 60)} دقيقة`;
                if (diff < 86400) return `${Math.floor(diff / 3600)} ساعة`;
                if (diff < 604800) return `${Math.floor(diff / 86400)} يوم`;
                return date.toLocaleDateString('ar-EG');
            }

            showToast(message, type = 'info') {
                const existing = document.querySelector('.toast-notification');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = `toast-notification`;
                
                const colors = {
                    success: '#2ed573',
                    danger: '#ff4757',
                    warning: '#ffa502',
                    info: '#4f8cff'
                };

                toast.style.borderRight = `4px solid ${colors[type] || '#4f8cff'}`;
                toast.innerHTML = `
                    <div style="display:flex;align-items:flex-start;gap:10px;color:var(--text-primary);">
                        <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'}" 
                           style="color:${colors[type] || '#4f8cff'};font-size:20px;margin-top:2px;"></i>
                        <span style="font-size:14px;white-space:pre-line;">${message}</span>
                    </div>
                `;

                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 300);
                }, 5000);
            }

            startHeartbeat() {
                setInterval(async () => {
                    if (this.isLoggedIn) {
                        try {
                            await this.apiRequest('/heartbeat', 'POST', {});
                        } catch (e) {
                            // تجاهل الأخطاء
                        }
                    }
                }, 60000);
            }
        }

            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ============================================
        // تشغيل التطبيق
        // ============================================
        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new SubscriptionManager();
            window.app = app;
        });
    </script>

</body>
</html>
